# 自動生成ファイル。編集せず shared/messages.ts を直して npm run gen:asyncapi。
asyncapi: 3.0.0
info:
  title: marubatsu WebSocket API
  version: 2.0.0
  description: リアルタイム・ルーム制マルバツ。/ws?room=xxx で接続し、Action を送って state を受け取る。
servers:
  local:
    host: localhost:3001
    protocol: ws
    pathname: /ws
channels:
  ws:
    address: /ws
    parameters:
      room:
        description: ルーム名 (省略時 lobby)。同名は同じ盤面を共有する。
    messages:
      move:
        $ref: "#/components/messages/Move"
      reset:
        $ref: "#/components/messages/Reset"
      state:
        $ref: "#/components/messages/State"
operations:
  sendAction:
    action: send
    channel:
      $ref: "#/channels/ws"
    summary: "クライアント → サーバ: 手を打つ / リセット"
    messages:
      - $ref: "#/channels/ws/messages/move"
      - $ref: "#/channels/ws/messages/reset"
  receiveState:
    action: receive
    channel:
      $ref: "#/channels/ws"
    summary: "サーバ → クライアント: 最新盤面の同期"
    messages:
      - $ref: "#/channels/ws/messages/state"
components:
  messages:
    Move:
      name: move
      title: マスに打つ
      payload:
        type: object
        properties:
          type:
            type: string
            const: move
          index:
            type: integer
            minimum: 0
            maximum: 8
        required:
          - type
          - index
        additionalProperties: false
    Reset:
      name: reset
      title: リセット
      payload:
        type: object
        properties:
          type:
            type: string
            const: reset
        required:
          - type
        additionalProperties: false
    State:
      name: state
      title: 盤面の同期
      payload:
        type: object
        properties:
          type:
            type: string
            const: state
          state:
            type: object
            properties:
              board:
                type: array
                items:
                  anyOf:
                    - type: string
                      enum:
                        - X
                        - O
                    - type: "null"
                minItems: 9
                maxItems: 9
              turn:
                type: string
                enum:
                  - X
                  - O
              winner:
                anyOf:
                  - type: string
                    enum:
                      - X
                      - O
                  - type: "null"
            required:
              - board
              - turn
              - winner
            additionalProperties: false
        required:
          - type
          - state
        additionalProperties: false
