# 自動生成ファイル。編集せず shared/messages.ts を直して npm run gen:asyncapi。
asyncapi: 3.0.0
info:
  title: speed-marubatsu WebSocket API
  version: 2.0.0
  description: リアルタイム連打マルバツ。/ws?room=xxx で接続し、ready/tap を送って state を受け取る。
servers:
  local:
    host: localhost:3001
    protocol: ws
    pathname: /ws
channels:
  ws:
    address: /ws
    parameters:
      room:
        description: ルーム名 (省略時 lobby)。同名は同じ盤面を共有する。
    messages:
      tap:
        $ref: "#/components/messages/Tap"
      ready:
        $ref: "#/components/messages/Ready"
      reset:
        $ref: "#/components/messages/Reset"
      state:
        $ref: "#/components/messages/State"
      joined:
        $ref: "#/components/messages/Joined"
      presence:
        $ref: "#/components/messages/Presence"
operations:
  sendAction:
    action: send
    channel:
      $ref: "#/channels/ws"
    summary: "クライアント → サーバ: スタート / マスを連打 / リセット"
    messages:
      - $ref: "#/channels/ws/messages/ready"
      - $ref: "#/channels/ws/messages/tap"
      - $ref: "#/channels/ws/messages/reset"
  receiveState:
    action: receive
    channel:
      $ref: "#/channels/ws"
    summary: "サーバ → クライアント: 席の割り当て・在席・最新盤面の同期"
    messages:
      - $ref: "#/channels/ws/messages/joined"
      - $ref: "#/channels/ws/messages/presence"
      - $ref: "#/channels/ws/messages/state"
components:
  messages:
    Tap:
      name: tap
      title: マスを連打する
      payload:
        type: object
        properties:
          type:
            type: string
            const: tap
          index:
            type: integer
            minimum: 0
            maximum: 8
        required:
          - type
          - index
        additionalProperties: false
    Ready:
      name: ready
      title: スタートを押す (両者で同時スタート)
      payload:
        type: object
        properties:
          type:
            type: string
            const: ready
        required:
          - type
        additionalProperties: false
    Reset:
      name: reset
      title: リセット
      payload:
        type: object
        properties:
          type:
            type: string
            const: reset
        required:
          - type
        additionalProperties: false
    State:
      name: state
      title: 盤面の同期
      payload:
        type: object
        properties:
          type:
            type: string
            const: state
          state:
            type: object
            properties:
              phase:
                type: string
                enum:
                  - ready
                  - playing
                  - finished
              board:
                type: array
                items:
                  anyOf:
                    - type: string
                      enum:
                        - X
                        - O
                    - type: "null"
                minItems: 9
                maxItems: 9
              meters:
                type: array
                items:
                  type: integer
                minItems: 9
                maxItems: 9
              ready:
                type: object
                properties:
                  X:
                    type: boolean
                  O:
                    type: boolean
                required:
                  - X
                  - O
                additionalProperties: false
              winner:
                anyOf:
                  - type: string
                    enum:
                      - X
                      - O
                  - type: "null"
            required:
              - phase
              - board
              - meters
              - ready
              - winner
            additionalProperties: false
        required:
          - type
          - state
        additionalProperties: false
    Joined:
      name: joined
      title: 席の割り当て (X=1P / O=2P / null=観戦)
      payload:
        type: object
        properties:
          type:
            type: string
            const: joined
          mark:
            anyOf:
              - type: string
                enum:
                  - X
                  - O
              - type: "null"
        required:
          - type
          - mark
        additionalProperties: false
    Presence:
      name: presence
      title: 1P/2P の在席
      payload:
        type: object
        properties:
          type:
            type: string
            const: presence
          seats:
            type: object
            properties:
              X:
                type: boolean
              O:
                type: boolean
            required:
              - X
              - O
            additionalProperties: false
        required:
          - type
          - seats
        additionalProperties: false
